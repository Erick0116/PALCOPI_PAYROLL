{% extends "base.html" %}
{% block content %}
<h1 class="mb-4">Attendance Records</h1>

<!-- Toolbar -->
<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-3">
    <!-- Search Form -->
    <form class="row g-2" method="GET" action="{{ url_for('attendance.attendance') }}">
        <div class="col-auto">
            <input type="text" class="form-control" name="search" placeholder="Search by name" value="{{ search }}">
        </div>
        <div class="col-auto">
            <input type="date" class="form-control" name="date_from" value="{{ date_from }}">
        </div>
        <div class="col-auto">
            <input type="date" class="form-control" name="date_to" value="{{ date_to }}">
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">Search</button>
        </div>
    </form>

    <!-- Action Buttons -->
    <div class="d-flex gap-2">
        <!-- Import CSV -->
        <form method="POST" enctype="multipart/form-data" action="{{ url_for('attendance.attendance') }}" class="d-flex gap-2">
            <input type="file" name="csv_file" class="form-control" style="width: 200px;" required>
            <button type="submit" class="btn btn-warning">Import Data CSV</button>
        </form>

        <!-- New Record -->
        <button class="btn btn-success" onclick="openModal()">+ New</button>
    </div>
</div>

<!-- Table -->
<div class="table-responsive">
    <table class="table table-striped table-bordered align-middle">
        <thead class="table-dark">
            <tr>
                <th>Employee ID</th>
                <th>Name</th>
                <th>Date</th>
                <th>Time In</th>
                <th>Time Out</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for rec in records %}
            <tr>
                <td>{{ rec.id }}</td>
                <td>{{ rec.name }}</td>
                <td>{{ rec.date }}</td>
                <td>{{ rec.time_in }}</td>
                <td>{{ rec.time_out }}</td>
                <td>
                    <!-- Edit Button triggers modal -->
                    <button class="btn btn-sm btn-warning" data-bs-toggle="modal" data-bs-target="#editModal{{ rec.id }}">
                        Edit
                    </button>
                    <form method="POST" action="{{ url_for('attendance.delete_attendance', emp_id=rec.id) }}" class="d-inline">
                        <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                    </form>
                </td>
            </tr>

            <!-- Edit Modal for this record -->
            <div class="modal fade" id="editModal{{ rec.id }}" tabindex="-1" aria-hidden="true">
              <div class="modal-dialog">
                <div class="modal-content">
                  <form method="POST" action="{{ url_for('attendance.edit_attendance', emp_id=rec.id) }}">
                    <div class="modal-header">
                      <h5 class="modal-title">Edit Attendance</h5>
                      <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                      <div class="mb-3">
                        <label class="form-label">Name:</label>
                        <input type="text" class="form-control" name="name" value="{{ rec.name }}" required>
                      </div>
                      <div class="mb-3">
                        <label class="form-label">Date:</label>
                        <input type="date" class="form-control" name="date" value="{{ rec.date }}" required>
                      </div>
                      <div class="mb-3">
                        <label class="form-label">Time In:</label>
                        <input type="time" class="form-control" name="time_in" value="{{ rec.time_in }}" required>
                      </div>
                      <div class="mb-3">
                        <label class="form-label">Time Out:</label>
                        <input type="time" class="form-control" name="time_out" value="{{ rec.time_out }}" required>
                      </div>
                    </div>
                    <div class="modal-footer">
                      <button type="submit" class="btn btn-success">Save Changes</button>
                      <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    </div>
                  </form>
                </div>
              </div>
            </div>
            {% endfor %}
        </tbody>
    </table>
</div>

<!-- New Record Modal -->
<div id="newModal" class="modal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add New Attendance</h5>
                <button type="button" class="btn-close" onclick="closeModal()"></button>
            </div>
            <div class="modal-body">
                <form method="POST" action="{{ url_for('attendance.new_attendance') }}" class="row g-3">
                    <div class="col-12">
                        <label class="form-label">Employee ID:</label>
                        <input type="text" class="form-control" name="id" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Name:</label>
                        <input type="text" class="form-control" name="name" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Date:</label>
                        <input type="date" class="form-control" name="date" required>
                    </div>
                    <div class="col-6">
                        <label class="form-label">Time In:</label>
                        <input type="time" class="form-control" name="time_in" required>
                    </div>
                    <div class="col-6">
                        <label class="form-label">Time Out:</label>
                        <input type="time" class="form-control" name="time_out" required>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-success">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
function openModal() {
    document.getElementById("newModal").style.display = "block";
}
function closeModal() {
    document.getElementById("newModal").style.display = "none";
}
window.onclick = function(event) {
    const modal = document.getElementById("newModal");
    if (event.target == modal) {
        modal.style.display = "none";
    }
}
</script>
{% endblock %}
