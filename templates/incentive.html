{% extends "base.html" %}

{% block content %}
<div class="container">
   <!--  <h1 class="mt-4">Employee Incentives</h1> -->

    <!-- Search Bar -->
    <div class="mb-3">
        <input type="text" id="employeeSearch" class="form-control" placeholder="Search employee by name...">
    </div>

    <!-- Employee Data Grid -->
    <table class="table table-striped mt-3" id="employeeTable">
        <thead class="table-dark">
            <tr>
                <th>Name</th>
                <th>Employment Status</th>
                <th>Position</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for employee in employees %}
            <tr>
                <td>{{ employee.name }}</td>
                <td>{{ employee.employment_status }}</td>
                <td>{{ employee.position }}</td>
                <td>
                    <button class="btn btn-primary btn-sm" 
                            data-bs-toggle="modal" 
                            data-bs-target="#incentiveModal"
                            data-name="{{ employee.name }}">
                        Add Incentive
                    </button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<!-- Incentive Modal (same as before) -->
<div class="modal fade" id="incentiveModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <form id="incentiveForm" method="POST" action="{{ url_for('incentive.add_incentive') }}">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Add Incentive</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Employee Name</label>
            <input type="text" class="form-control" id="employeeName" name="name" readonly>
          </div>
          <div class="mb-3">
            <label class="form-label">Incentive Type</label>
            <select class="form-select" name="incentive_type" required>
              <option value="Tarpaulin">Tarpaulin</option>
              <option value="Commission">Commission</option>
              <option value="Bookbind">Bookbind</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" name="description" rows="3"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">Amount</label>
            <input type="number" class="form-control" name="amount" required>
          </div>
        </div>
        <div class="mb-3">
  <label class="form-label">Status</label>
  <select class="form-select" name="status" required>
    <option value="hold">Hold</option>
    <option value="released">Released</option>
  </select>
</div>

        <div class="modal-footer">
          <button type="submit" class="btn btn-success">Save Incentive</button>
        </div>
      </div>
    </form>
  </div>
</div>

<script>
  // Populate employee name in modal
  var incentiveModal = document.getElementById('incentiveModal');
  incentiveModal.addEventListener('show.bs.modal', function (event) {
    var button = event.relatedTarget;
    var name = button.getAttribute('data-name');
    var input = incentiveModal.querySelector('#employeeName');
    input.value = name;
  });

  // Search filter
  document.getElementById('employeeSearch').addEventListener('keyup', function() {
    var filter = this.value.toLowerCase();
    var rows = document.querySelectorAll('#employeeTable tbody tr');
    rows.forEach(function(row) {
      var nameCell = row.querySelector('td:first-child');
      if (nameCell.textContent.toLowerCase().includes(filter)) {
        row.style.display = '';
      } else {
        row.style.display = 'none';
      }
    });
  });
</script>
{% endblock %}
